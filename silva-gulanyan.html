    .gp-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; cursor: pointer; }

    return filled
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
  }

  /* TABS */
  let mode = 'all';
  function setTab(m) {
    mode = m;
    ['all','new','favs'].forEach(x =>
      document.getElementById('tab-'+x).classList.toggle('active', x === m));
    renderTracks();
  }
  document.getElementById('tab-all').addEventListener('click', () => setTab('all'));
  document.getElementById('tab-new').addEventListener('click', () => setTab('new'));
  document.getElementById('tab-favs').addEventListener('click', () => setTab('favs'));

  let searchQuery = '';
  const searchInput = document.getElementById('track-search');
  if (searchInput) searchInput.addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    renderTracks();
  });

  function renderTracks() {
    const trackList = document.getElementById('track-list');
    const favEmpty = document.getElementById('fav-empty');
    let items = playlist;
    if (mode === 'favs') items = playlist.filter(t => isFav(t.song));
    else if (mode === 'new') items = playlist.filter(t => isNewSong(t.song));
    if (searchQuery) items = items.filter(t =>
      t.label.toLowerCase().includes(searchQuery) || t.song.toLowerCase().includes(searchQuery));
    trackList.innerHTML = '';
    if (items.length === 0) {
      favEmpty.textContent = searchQuery ? 'Ոչինչ չգտնվեց' : (mode === 'favs' ? 'Դեռ սիրած երգ չկա — սեղմիր ❤️' : 'Նոր երգ չկա');
      favEmpty.style.display = 'block';
      return;
    }
    favEmpty.style.display = 'none';
    items.forEach((t, i) => {
      const realIdx = playlist.indexOf(t);
      const div = document.createElement('div');
      div.className = 'track-item';
      div.dataset.idx = realIdx;
      div.innerHTML = `
        <span class="track-num">${String(i+1).padStart(2,'0')}</span>
        <div class="track-name">${t.label}</div>
        ${isNewSong(t.song) ? '<span class="new-badge">NEW</span>' : ''}
        <button class="track-fav${isFav(t.song) ? ' active' : ''}" data-song="${t.song}">${iconHeart(isFav(t.song))}</button>
        <button class="track-share-btn" data-song="${t.song}" style="background:none;border:none;cursor:pointer;color:var(--text-dim);display:flex;align-items:center;padding:4px;transition:color 0.2s;" title="Կիսվել"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
        <button class="track-play-btn">${iconPlay()}</button>`;
      div.addEventListener('click', () => playTrack(realIdx));
      div.querySelector('.track-fav').addEventListener('click', e => {
        e.stopPropagation();
        const btn = e.currentTarget;
        const active = toggleFav(t.song);
        btn.classList.toggle('active', active);
        btn.innerHTML = iconHeart(active);
        if (mode === 'favs' && !active) renderTracks();
      });
      div.querySelector('.track-share-btn').addEventListener('click', e => {
        e.stopPropagation();
        const songName = t.label;
        const shareUrl = 'https://imastun.org/silva-gulanyan?play=' + encodeURIComponent(t.song);
        const shareData = {
          title: `${songName} — Silva Gulanyan`,
          text: `🎵 ${songName} — Silva Gulanyan\nListen on Imastun Studio`,
          url: shareUrl
        };
        if (navigator.share) {
          navigator.share(shareData).catch(() => {});
        } else {
          navigator.clipboard.writeText(shareUrl).then(() => {
            const btn = e.currentTarget;
            btn.style.color = 'var(--gold)';
            setTimeout(() => btn.style.color = 'var(--text-dim)', 1500);
          }).catch(() => {});
        }
      });
      trackList.appendChild(div);
    });
  }

  renderTracks();

  /* TOTAL DURATION */
  function calcTotalDuration() {
    const promises = playlist.map(t => new Promise(resolve => {
      const a = new Audio();
      a.preload = 'metadata';
      a.src = t.src;
      a.addEventListener('loadedmetadata', () => resolve(a.duration || 0));
      a.addEventListener('error', () => resolve(0));
    }));
    Promise.all(promises).then(durations => {
      const total = durations.reduce((sum, d) => sum + (isFinite(d) ? d : 0), 0);
      const totalMin = Math.round(total / 60);
      const hours = Math.floor(totalMin / 60);
      const mins = totalMin % 60;
      const el = document.getElementById('duration-stat');
      if (el) el.textContent = hours > 0 ? `${hours}ժ ${mins}ր` : `${mins}ր`;
    });
  }
  calcTotalDuration();

  // Keep the "Երգ" stat in sync with the actual number of songs
  (function(){
    const el = document.getElementById('song-count-stat');
    if (el) el.textContent = ARTIST.songs.length;
  })();


  /* PLAYER */
  const engine    = document.getElementById('audio-engine');
  const engine2   = new Audio();
  engine2.preload = 'auto';
  const engines   = [engine, engine2];
  let activeIdx   = 0;
  const active    = () => engines[activeIdx];
  const inactive  = () => engines[1 - activeIdx];
  const CROSSFADE_SEC = 2.5;
  let crossfadeTimer = null;

  const gpEl      = document.getElementById('global-player');
  const gpCover   = document.getElementById('gp-cover');
  const gpArtist  = document.getElementById('gp-artist');
  const gpSong    = document.getElementById('gp-song');
  const gpPlayBtn = document.getElementById('gp-play');
  const gpPlayIco = document.getElementById('gp-play-icon');
  const gpPrev    = document.getElementById('gp-prev');
  const gpNext    = document.getElementById('gp-next');
  const gpBar     = document.getElementById('gp-bar');
  const gpFill    = document.getElementById('gp-fill');
  const gpCur     = document.getElementById('gp-cur');
  const gpDur     = document.getElementById('gp-dur');

  let currentIdx = -1, isPlaying = false;
  const PLAY_SVG  = `<path d="M5 3l10 6-10 6V3z" fill="currentColor"/>`;
  const PAUSE_SVG = `<rect x="4" y="3" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="10.5" y="3" width="3.5" height="12" rx="1" fill="currentColor"/>`;

  function setPlayIcon(p) { gpPlayIco.innerHTML = p ? PAUSE_SVG : PLAY_SVG; }
  function fmtTime(s) { return isNaN(s) ? '0:00' : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
  function iconPlay()  { return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 2l7 4-7 4V2z" fill="currentColor"/></svg>`; }
  function iconPause() { return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="2" width="3" height="8" rx="0.8" fill="currentColor"/><rect x="7" y="2" width="3" height="8" rx="0.8" fill="currentColor"/></svg>`; }

  function highlightTrack(idx) {
    document.querySelectorAll('.track-item').forEach(el => {
      const playing = parseInt(el.dataset.idx) === idx;
      el.classList.toggle('playing', playing);
      const btn = el.querySelector('.track-play-btn');
      if (btn) btn.innerHTML = (playing && isPlaying) ? iconPause() : iconPlay();
    });
  }

  function cancelCrossfade() {
    if (crossfadeTimer) { clearInterval(crossfadeTimer); crossfadeTimer = null; }
    inactive().pause();
    inactive().removeAttribute('src');
    inactive().volume = 1;
    active().volume = 1;
  }

  function startCrossfade() {
    const nextIdx = currentIdx + 1;
    if (nextIdx >= playlist.length || crossfadeTimer) return;
    const cur = active();
    const nxt = inactive();
    const t = playlist[nextIdx];
    nxt.src = t.src;
    nxt.currentTime = 0;
    nxt.volume = 0;
    nxt.play().catch(() => {});

    const steps = 30;
    const stepMs = (CROSSFADE_SEC * 1000) / steps;
    let i = 0;
    crossfadeTimer = setInterval(() => {
      i++;
      const ratio = i / steps;
      cur.volume = Math.max(0, 1 - ratio);
      nxt.volume = Math.min(1, ratio);
      if (i >= steps) {
        clearInterval(crossfadeTimer);
        crossfadeTimer = null;
        activeIdx = 1 - activeIdx;
        currentIdx = nextIdx;
        gpCover.src = t.cover;
        gpSong.textContent = t.label;
        gpFill.style.width = '0%';
        highlightTrack(currentIdx);
        cur.pause();
        cur.currentTime = 0;
        cur.volume = 1;
      }
    }, stepMs);
  }

  function playTrack(idx) {
    if (idx < 0 || idx >= playlist.length) return;
    if (idx === currentIdx && isPlaying) { active().pause(); return; }
    cancelCrossfade();
    currentIdx = idx;
    const t = playlist[idx];
    if (typeof gtag === 'function') {
      gtag('event', 'play_song', { song_name: t.label, artist_name: ARTIST.name });
    }
    const eng = active();
    eng.src = t.src;
    eng.volume = 1;
    gpCover.src = t.cover;
    gpArtist.textContent = ARTIST.name;
    gpSong.textContent = t.label;
    gpEl.classList.add('visible');
    gpFill.style.width = '0%';
    gpCur.textContent = gpDur.textContent = '0:00';
    highlightTrack(idx);
    eng.play().then(() => { isPlaying = true; setPlayIcon(true); }).catch(() => {});
  }

  gpPlayBtn.addEventListener('click', () => {
    if (currentIdx < 0) return;
    if (isPlaying) {
      active().pause();
      if (crossfadeTimer) inactive().pause();
      isPlaying = false; setPlayIcon(false); highlightTrack(currentIdx);
    } else {
      active().play().catch(() => {});
      if (crossfadeTimer) inactive().play().catch(() => {});
      isPlaying = true; setPlayIcon(true); highlightTrack(currentIdx);
    }
  });

  gpPrev.addEventListener('click', () => { if (currentIdx > 0) playTrack(currentIdx - 1); });
  gpNext.addEventListener('click', () => { if (currentIdx < playlist.length - 1) playTrack(currentIdx + 1); });

  function setupEngine(eng) {
    eng.addEventListener('timeupdate', () => {
      if (eng !== active() || !eng.duration) return;
      gpFill.style.width = (eng.currentTime / eng.duration * 100) + '%';
      gpCur.textContent = fmtTime(eng.currentTime);
      gpDur.textContent = fmtTime(eng.duration);
      const remaining = eng.duration - eng.currentTime;
      if (!crossfadeTimer && remaining > 0 && remaining <= CROSSFADE_SEC && currentIdx < playlist.length - 1) {
        startCrossfade();
      }
    });
    eng.addEventListener('play',  () => { if (eng === active()) { isPlaying = true;  setPlayIcon(true);  highlightTrack(currentIdx); } });
    eng.addEventListener('pause', () => { if (eng === active() && !crossfadeTimer) { isPlaying = false; setPlayIcon(false); highlightTrack(currentIdx); } });
    eng.addEventListener('ended', () => {
      if (eng !== active() || crossfadeTimer) return;
      if (currentIdx < playlist.length - 1) playTrack(currentIdx + 1);
      else { isPlaying = false; setPlayIcon(false); }
    });
  }
  setupEngine(engine);
  setupEngine(engine2);

  gpBar.addEventListener('click', e => {
    const eng = active();
    if (!eng.duration) return;
    const r = gpBar.getBoundingClientRect();
    eng.currentTime = ((e.clientX - r.left) / r.width) * eng.duration;
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); gpPlayBtn.click(); }
  });

  // Open a shared song link: ?play=song
  (function() {
    const p = new URLSearchParams(location.search).get('play');
    if (!p) return;
    const idx = playlist.findIndex(t => t.song === p);
    if (idx >= 0) setTimeout(() => playTrack(idx), 700);
  })();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
