<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Հայ բանաստեղծների երգեր</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 120% at 50% 40%, #1a130b 0%, #0d0a06 50%, #050403 100%);
    overflow:hidden; display:grid; place-items:center;
    font-family:"Noto Serif Armenian",serif;
  }
  .frame{
    position:relative; width:min(94vmin,820px); aspect-ratio:1/1;
    border-radius:10px; overflow:hidden;
    box-shadow:0 40px 90px rgba(0,0,0,.7), 0 0 60px rgba(201,160,70,.18);
    animation:enter 1.4s cubic-bezier(.16,.84,.2,1) both;
  }
  @keyframes enter{
    0%{opacity:0; transform:scale(.94); filter:brightness(.6)}
    100%{opacity:1; transform:none; filter:none}
  }
  .frame > img{ position:absolute; inset:0; width:100%; height:100%; object-fit:fill; display:block; }

  /* ===== per-portrait hotspot ===== */
  .spot{
    position:absolute; border-radius:4px; overflow:hidden;
    z-index:3; pointer-events:auto; cursor:pointer;
  }
  /* warm glow that pulses on, in sequence */
  .spot::after{
    content:""; position:absolute; inset:-6%;
    background:radial-gradient(ellipse at center,
       rgba(255,236,170,.85), rgba(255,196,90,.35) 45%, transparent 72%);
    mix-blend-mode:screen; opacity:0;
    animation:glow 9.35s ease-in-out var(--d) infinite;
  }
  /* gold light-sweep across each portrait, in sequence */
  .spot::before{
    content:""; position:absolute; top:-25%; left:-120%;
    width:60%; height:150%;
    background:linear-gradient(100deg, transparent,
       rgba(255,248,225,.0) 30%, rgba(255,248,225,.85) 50%,
       rgba(255,248,225,0) 70%, transparent);
    transform:rotate(10deg); z-index:2;
    animation:slide 9.35s ease-in-out var(--d) infinite;
  }
  /* gold ring flash on the frame edge */
  .spot{ box-shadow:0 0 0 0 rgba(255,214,120,0); animation:ring 9.35s ease-in-out var(--d) infinite; }

  @keyframes glow{
    0%,100%{opacity:0} 4%{opacity:1} 12%{opacity:.9} 18%{opacity:0}
  }
  @keyframes slide{
    0%{left:-120%} 3%{left:-120%} 16%{left:140%} 100%{left:140%}
  }
  @keyframes ring{
    0%,100%{box-shadow:0 0 0 0 rgba(255,214,120,0)}
    6%{box-shadow:0 0 26px 4px rgba(255,214,120,.75)}
    16%{box-shadow:0 0 0 0 rgba(255,214,120,0)}
  }
  /* tap / hover to light a portrait yourself */
  .spot:hover::after, .spot:active::after{opacity:1; animation:none}
  .spot:hover{box-shadow:0 0 30px 5px rgba(255,214,120,.85); animation:none}

  /* gentle ambient on whole poster */
  .ambient{position:fixed; width:90vmin; height:90vmin; border-radius:50%;
    background:radial-gradient(circle, rgba(201,160,70,.28), transparent 70%);
    filter:blur(50px); z-index:0; animation:flick 6s ease-in-out infinite; pointer-events:none}
  @keyframes flick{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:.95;transform:scale(1.05)}}

  .caption{position:fixed; bottom:16px; left:0; right:0; text-align:center;
    color:#b08e44; font-size:13px; letter-spacing:2px; z-index:5;
    opacity:0; animation:fade 1s ease 1.4s forwards; text-shadow:0 1px 6px rgba(0,0,0,.8)}
  @keyframes fade{to{opacity:.85}}

  @media (prefers-reduced-motion:reduce){
    .spot::after,.spot::before,.spot,.ambient{animation:none}
  }
</style>
